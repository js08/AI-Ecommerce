spring.application.name=raceTime


#spring.application.name=stopwatch


# 1. Database Connection URL
# Logic: 'localhost:5432' is the default address. 'stopwatch_db' is your database name.
spring.datasource.url=jdbc:postgresql://localhost:5432/stopWatch

# 2. Database Credentials
# Logic: Use your Postgres username and password here.
spring.datasource.username=postgres
#spring.datasource.password=your_password_here

# 3. JDBC Driver
# Logic: Tells Java which "translator" to use to talk to Postgres.
spring.datasource.driver-class-name=org.postgresql.Driver

# 4. JPA / Hibernate Properties
# Logic: 'update' automatically creates or updates tables based on your Java @Entity classes.
spring.jpa.hibernate.ddl-auto=update

# 5. Show SQL in Console
# Logic: Set to 'true' so you can see the actual SQL commands Spring writes in your terminal.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 6. Database Platform (Dialect)
# Logic: Tells Hibernate to use PostgreSQL-specific optimized commands.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

