#spring.application.name=userservice
#
#
## ==========================================
## REACTIVE POSTGRESQL CONFIGURATION (R2DBC)
## ==========================================
#
## R2DBC connection URL format:
## r2dbc:postgresql://<host>:<port>/<database>
#spring.r2dbc.url=r2dbc:postgresql://localhost:5432/userdb
#
## Database credentials
#spring.r2dbc.username=postgres
#spring.password=rajkumar
#
## ==========================================
## CONNECTION POOL SETTINGS (r2dbc-pool)
## ==========================================
#
## Initial number of connections in the pool
#spring.r2dbc.pool.initial-size=10
#
## Maximum connections allowed in the pool
#spring.r2dbc.pool.max-size=20
#
## Maximum idle time before a connection is closed (30 minutes)
#spring.r2dbc.pool.max-idle-time=30m
#
## Time to wait for a connection from the pool (5 seconds)
#spring.r2dbc.pool.max-acquire-time=5s
#
## Time to wait before timing out a connection validation
#spring.r2dbc.pool.validation-query=SELECT 1
#
## ==========================================
## LOGGING (optional – helpful for debugging)
## ==========================================
#
## Show SQL queries executed by R2DBC (DEBUG level)
#logging.level.org.springframework.data.r2dbc=DEBUG
#logging.level.io.r2dbc.postgresql.QUERY=DEBUG
#
## ==========================================
## GENERAL SPRING SETTINGS
## ==========================================
#
## Prefer to use reactive R2DBC (avoid accidental JDBC auto-config)
#spring.sql.init.mode=never
#
## If you have a schema.sql file, uncomment next line to run it on startup
## spring.sql.init.schema-locations=classpath:schema.sql



spring.application.name=user
#spring.r2dbc.url=r2dbc:postgresql://localhost:5432/userdb

spring.datasource.url=jdbc:postgresql://localhost:5432/userdb
spring.datasource.username=postgres
spring.datasource.password=rajkumar

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000