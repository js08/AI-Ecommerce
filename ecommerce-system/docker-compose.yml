version: '3.8'

services:
  # ============ DATABASES ============
  
  # PostgreSQL 1: User & Order Data (needs ACID compliance)
  # ACID = Atomicity, Consistency, Isolation, Durability - guarantees no data loss
  postgres_main:
    image: postgres:15
    container_name: postgres_main
    environment:
      POSTGRES_DB: ecommerce_main
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5432:5432"  # Host:Container port mapping
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 2: Inventory Data (separate for better isolation)
  postgres_inventory:
    image: postgres:15
    container_name: postgres_inventory
    environment:
      POSTGRES_DB: ecommerce_inventory
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password_123
    ports:
      - "5433:5432"  # Different port to avoid conflict
    volumes:
      - postgres_inventory_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  # Cassandra: For high-write operations (product views, user sessions)
  # Cassandra is a NoSQL database - better for billions of writes
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"  # CQL (Cassandra Query Language) port
    environment:
      CASSANDRA_CLUSTER_NAME: ecommerce_cluster
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: cassandra
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - ecommerce-network

  # ============ CACHING LAYER ============
  
  # Redis Cluster: For caching (super fast, in-memory)
  # Redis Node 1
  redis_node1:
    image: redis:7-alpine
    container_name: redis_node1
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf
    volumes:
      - redis_data1:/data
    networks:
      - ecommerce-network

  # Redis Node 2 (for high availability)
  redis_node2:
    image: redis:7-alpine
    container_name: redis_node2
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --cluster-enabled yes
    volumes:
      - redis_data2:/data
    networks:
      - ecommerce-network

  # ============ MESSAGE QUEUE ============
  
  # Zookeeper: Manages Kafka cluster (keeps track of which brokers are alive)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce-network

  # Kafka: Message broker for async communication between services
  # Handles millions of messages per second
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 10  # 10 partitions = can process 10 messages in parallel
    ports:
      - "9092:9092"
    networks:
      - ecommerce-network

  # Kafka UI: Web interface to see messages (helpful for debugging)
  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network

  # ============ SEARCH ENGINE ============
  
  # Elasticsearch: For fast product search (like Google for products)
  elasticsearch:
    image: elasticsearch:8.10.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false  # Disable security for development
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"  # Allocate 1GB RAM
    ports:
      - "9200:9200"  # REST API port
      - "9300:9300"  # Internal communication
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-network

# ============ NETWORK CONFIGURATION ============
networks:
  ecommerce-network:
    driver: bridge  # Creates isolated network for all containers

# ============ PERSISTENT STORAGE ============
volumes:
  postgres_main_data:
  postgres_inventory_data:
  cassandra_data:
  redis_data1:
  redis_data2:
  elasticsearch_data: