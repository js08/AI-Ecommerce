# Docker Compose V2 - no version needed

networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network

volumes:
  postgres_main_data:
  postgres_inventory_data:
  redis_data:
  kafka_data:
  elasticsearch_data:

services:
  # ============================================
  # DATABASES
  # ============================================

  postgres-main:
    image: postgres:14-alpine
    container_name: postgres-main
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_main
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:14-alpine
    container_name: postgres-inventory
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_inventory
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres_inventory_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # KAFKA (Using Confluent images - most reliable)
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network

  # ============================================
  # SEARCH ENGINE
  # ============================================

  elasticsearch:
    image: elasticsearch:7.17.15
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # MICROSERVICES
  # ============================================

  api-gateway:
    image: node:18-alpine
    container_name: api-gateway
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./api-gateway:/app
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key
    ports:
      - "3000:3000"
    networks:
      - ecommerce-network
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: sh -c "npm install && node server.js"

  ai-service:
    image: node:18-slim
    container_name: ai-service
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./services/ai-service:/app
      - ./models-data:/app/models-data
    environment:
      NODE_ENV: development
      PORT: 8008
      DB_HOST: postgres-main
      DB_PORT: 5432
      DB_NAME: ecommerce_main
      DB_USER: ecommerce_user
      DB_PASSWORD: ecommerce_password_123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8008:8008"
    networks:
      - ecommerce-network
    depends_on:
      postgres-main:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: sh -c "npm install && node server.js"