# Removed version attribute as it's obsolete in newer Docker Compose
# Docker Compose now detects version automatically

services:
  # ============ DATABASES ============
  
  # PostgreSQL 1: User & Order Data
  postgres_main:
    image: postgres:16-alpine  # Using alpine for smaller size
    container_name: postgres_main
    environment:
      POSTGRES_DB: ecommerce_main
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL 2: Inventory Data
  postgres_inventory:
    image: postgres:16-alpine
    container_name: postgres_inventory
    environment:
      POSTGRES_DB: ecommerce_inventory
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres_inventory_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Cassandra: Fixed with working version
  cassandra:
    image: cassandra:4.0  # Using stable 4.0 version instead of 4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ecommerce_cluster
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: cassandra
      # Set resource limits for better performance on local machine
      CASSANDRA_HEAP_NEWSIZE: 100M
      CASSANDRA_MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - ecommerce-network
    restart: unless-stopped
    # Add resource limits to prevent system overload
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============ CACHING LAYER ============
  
  # Redis - Single node for development (simpler)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ MESSAGE QUEUE ============
  
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 10
      # Performance optimizations for local development
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    ports:
      - "9092:9092"
    networks:
      - ecommerce-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Kafka UI - Web interface for Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ============ SEARCH ENGINE ============
  
  # Elasticsearch: Using working version 8.6.0
  elasticsearch:
    image: elasticsearch:8.6.0  # Changed to working version
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false  # Disable security for development
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"  # Reduced memory for local development
      - cluster.routing.allocation.disk.threshold_enabled=false  # Disable disk space checks
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

# ============ NETWORK CONFIGURATION ============
networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network  # Explicit network name for easier reference

# ============ PERSISTENT STORAGE ============
volumes:
  postgres_main_data:
    driver: local
  postgres_inventory_data:
    driver: local
  cassandra_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local