# Context for global settings related to connection handling
events { 
    # Sets the maximum number of simultaneous connections per worker process
    worker_connections 4096; 
}

# The main block for all HTTP-related directives
http {
    # Defines a shared memory zone ($binary_remote_addr) to track client IPs.
    # 'mylimit' is the name, '10m' stores ~160k IPs, and 'rate=10r/s' is the speed limit.
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    # Sets the status code returned when the rate limit is exceeded (default is 503)
    # 429 is the standard "Too Many Requests" HTTP status
    limit_req_status 429;

    # Main server configuration block
    server {
        # Configures the server to listen for incoming traffic on port 80
        listen 80;

        # The location block matches the URI in the request (root in this case)
        location / {
            # Applies the 'mylimit' rule defined above.
            # 'burst=20' allows a temporary spike of 20 extra requests.
            # 'nodelay' ensures those burst requests aren't queued/slowed down.
            limit_req zone=mylimit burst=20 nodelay;

            # Passes the request to the backend service 'api-gateway' on port 8080
            proxy_pass http://api-gateway:8080;

            # Recommended: Includes the original host header and client IP for the backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}