spring.application.name=goal


# MongoDB Connection
spring.data.mongodb.uri=mongodb://localhost:27017/goal_db

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=goal-service-group
# This tells Spring how to turn the Kafka bytes back into a Java Object
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
